services:
  - type: web
    name: elitcoach-backend
    runtime: node
    rootDir: backend
    buildCommand: pnpm install && pnpm run build && pnpm exec prisma generate
    startCommand: node dist/main
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

      - key: DATABASE_URL
        sync: false

      # ❌ IMPORTANT: supprime DIRECT_URL (inutile dans ton setup actuel)
      # - key: DIRECT_URL

      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d

      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

      - key: CLOUDINARY_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: REDIS_URL
        sync: false

      - key: FRONTEND_URL
        value: https://elitcoach-frontend.onrender.com

  - type: web
    name: elitcoach-frontend
    runtime: node
    rootDir: frontend
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://elitcoach-backend.onrender.com/api
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
